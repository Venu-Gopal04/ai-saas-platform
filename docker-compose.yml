version: '3.8'

services:
  backend:
    build: ./backend
    container_name: writeai-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID}
      - STRIPE_ENTERPRISE_PRICE_ID=${STRIPE_ENTERPRISE_PRICE_ID}
      - CLIENT_URL=${CLIENT_URL}
    networks:
      - writeai-network

  frontend:
    build: ./frontend
    container_name: writeai-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - writeai-network

networks:
  writeai-network:
    driver: bridge